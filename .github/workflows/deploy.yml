name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: deploy-koast
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build site
        run: python generate.py
      - name: Stage deploy directory
        run: |
          mkdir -p dist
          rsync -a \
            --exclude='.git' --exclude='.github' --exclude='dist' \
            --exclude='generate.py' --exclude='data.py' \
            --exclude='wineries_extra.json' --exclude='__pycache__' \
            --exclude='README.md' \
            ./ dist/
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist --project-name=koast --branch=main
        env:
          CLOUDFLARE_ACCOUNT_ID: 9481e14d6980f4de99bebe0097842362
